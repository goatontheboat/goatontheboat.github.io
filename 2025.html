<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_ARCHIVE_2025</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 30px; }
        .header { border-bottom: 2px solid #0f0; padding-bottom: 20px; margin-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #333; padding: 20px; background: #0a0a0a; }
        h2 { font-size: 0.9rem; color: #fff; margin-bottom: 10px; }
        .impact-score { font-size: 2.5rem; font-weight: bold; color: #0f0; }
        .platform-list { list-style: none; padding: 0; margin-top: 10px; }
        .platform-list li { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        iframe { width: 100%; height: 250px; border: none; margin-top: 10px; }
        .back-btn { color: #fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn"><< BACK TO MAIN</a>
        <h1>2025_RETROSPECTIVE</h1>
    </div>

    <div class="grid-container" style="margin-bottom: 20px;">
        <div class="card">
            <h2>TOTAL INTEGRATED IMPACT</h2>
            <div class="impact-score">228,058</div>
            <p style="font-size: 0.7rem; color: #666;">(STREAMING + VIEWS)</p>
        </div>
        <div class="card">
            <h2>PLATFORM BREAKDOWN</h2>
            <ul class="platform-list">
                <li>YOUTUBE: 228,000</li>
                <li>SPOTIFY: 58</li>
                <li>APPLE MUSIC: 0</li>
            </ul>
        </div>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>TOP PERFORMING MUSIC</h2>
            <iframe src="https://www.youtube.com/embed/feJyRrQAvY4" allowfullscreen></iframe>
        </div>
        <div class="card">
            <h2>TOP PERFORMING SHORTS</h2>
            <iframe src="https://www.youtube.com/embed/a7pJOTG-1XQ" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
