<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>goat on the boat</title>
    <style>
        body { margin: 0; background: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 50px 0; }
        .container { display: flex; flex-direction: column; align-items: center; }
        
        /* 링크 스타일: 밑줄 제거 및 블록 설정 */
        a { text-decoration: none; display: block; margin: 10px 0; }

        .row { 
            position: relative;
            transition: transform 0.1s ease-out; 
            mix-blend-mode: multiply; 
        }

        .text-line { 
            font-family: 'Times New Roman', serif; 
            font-size: 6vw; font-weight: 900; line-height: 0.7; 
            text-shadow: 2px 0 #FF6B6B, -2px 0 #4ECDC4;
            white-space: nowrap;
        }

        /* 버튼 효과 */
        a:hover .row { transform: translateY(-5px); opacity: 0.8; }
        a:active .row { transform: translateY(2px); opacity: 1; }

        .c1 { color: #FF6B6B; } .c2 { color: #4ECDC4; } 
        .c3 { color: #FFE66D; } .c4 { color: #FF9F1C; } 
        .c5 { color: #2D9CDB; } .c6 { color: #BB6BD9; } 
        .c7 { color: #27AE60; } .c8 { color: #F783AC; }
    </style>
</head>
<body>
    <div class="container">
        <script>
            const colors = ['c1', 'c2', 'c3', 'c4', 'c5', 'c6', 'c7', 'c8'];
            for (let i = 0; i < 30; i++) {
                // 클릭 시 year_select.html로 이동하게 설정
                document.write(`
                    <a href="year_select.html">
                        <div class="row"><div class="text-line ${colors[i % 8]}">goat on the boat</div></div>
                    </a>
                `);
            }
        </script>
    </div>
</body>
</html>
