<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Select Year - goat on the boat</title>
    <style>
        body { 
            margin: 0; background: #fff; display: flex; flex-direction: column; 
            min-height: 100vh; font-family: 'Times New Roman', serif;
        }

        .select-container { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        .year-link { 
            text-decoration: none; font-size: 10vw; font-weight: 900; 
            margin: 30px 0; transition: transform 0.1s ease-out;
            cursor: pointer; mix-blend-mode: multiply;
        }

        .year-link:hover { transform: translateY(-8px); opacity: 0.8; }
        .year-link:active { transform: translateY(3px); }

        .c-2025 { color: #FF71A7; text-shadow: 4px 0 #7DE2D1; }
        .c-2026 { color: #36BAFF; text-shadow: 4px 0 #FFE86E; }

        /* 푸터 스타일 통일 (밑줄 제거) */
        footer { padding: 50px 20px; text-align: center; font-size: 0.9rem; font-weight: 900; }
        .sns-links a, .sns-links .email-text { 
            margin: 0 20px; color: #000; text-decoration: none; 
            font-weight: 900; font-family: 'Times New Roman', serif;
        }
        .sns-links a:hover { color: #FF71A7; }
    </style>
</head>
<body>

    <div class="select-container">
        <a href="2025.html" class="year-link c-2025">2025</a>
        <a href="2026.html" class="year-link c-2026">2026</a>
    </div>

    <footer>
        <div class="sns-links">
            <a href="https://www.youtube.com/@goat_on_the_boat" target="_blank">YOUTUBE</a>
            <a href="https://www.instagram.com/goatontheboat_kr/" target="_blank">INSTAGRAM</a>
            <span class="email-text">EMAIL: dldbwls980112@gmail.com</span>
        </div>
    </footer>

</body>
</html>
